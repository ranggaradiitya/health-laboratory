<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.6.1/font/bootstrap-icons.css"
    />
    <link rel="icon" type="image/jpg" href="../images/favicon.jpg" />
    <link rel="stylesheet" href="../style.css" />
    <title>Shopping Cart Page - Rajaerba Indochem</title>
  </head>
  <body style="overflow-x: hidden" class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-light bg-light sticky-top">
      <div class="container">
        <a class="navbar-brand" href="../index.html"
          ><img
            src="../images/rajaerba-logo.png"
            class="img-fluid"
            alt=""
            width="200"
        /></a>
        <a href="#shopping-cart" class="btn btn-warning text-white d-sm-none">
          <i id="cart-btn" class="bi bi-cart" value="0"></i>
        </a>
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navmenu"
        >
          <span class="navbar-toggler-icon"></span>
        </button>
        <div
          class="collapse navbar-collapse justify-content-center"
          id="navmenu"
        >
          <ul class="navbar-nav ms-auto">
            <li class="nav-item">
              <a
                href="../index.html"
                class="nav-link px-4 fw-bold hover-color text-center text-sm-start"
                >Home</a
              >
            </li>
            <li class="nav-item">
              <a
                href="shopping-cart.html"
                class="nav-link px-4 fw-bold hover-color text-center text-sm-start"
                >Buy Our Product</a
              >
            </li>
            <li class="nav-item">
              <a
                href="../index.html#ourteam"
                class="nav-link px-4 fw-bold hover-color text-center text-sm-start"
                >Our Team</a
              >
            </li>
            <li class="nav-item">
              <a
                href="../index.html#contactus"
                class="nav-link px-4 fw-bold hover-color text-center text-sm-start"
                >Contact Us</a
              >
            </li>
          </ul>
          <div class="ms-auto d-sm-flex">
            <a
              href="login.html"
              class="btn btn-warning p-2 text-light w-100 mx-0 mx-sm-2 my-2 my-sm-0"
              >Admin Login</a
            >
          </div>
        </div>
      </div>
    </nav>

    <!-- Shopping Cart -->
    <section class="bg-light p-0 pt-4 p-md-4">
      <div class="container">
        <div class="row g-5">
          <div class="col">
            <h1 class="text-warning mb-4 text-center text-sm-start">Product</h1>
            <div
              id="product-list"
              class="row row-cols-2 row-cols-lg-3 g-1 g-lg-4"
            >
              <!-- list product get from local storage -->
            </div>
          </div>
          <div class="col mb-5 mb-md-0" id="shopping-cart">
            <h1 class="text-warning mb-4 text-center text-sm-start">
              Shopping Cart
            </h1>
            <div class="table-responsive">
              <table class="table table-striped">
                <thead class="bg-warning text-light">
                  <tr>
                    <th>Product Name</th>
                    <th>Price</th>
                    <th>Quantity</th>
                    <th></th>
                  </tr>
                </thead>
                <tbody class="align-middle border-0 border-light">
                  <!-- list product that add to cart -->
                </tbody>
                <tfoot class="border-0 border-light">
                  <tr class="bg-warning text-light">
                    <td class="fw-bold" colspan="3" align="right">Total :</td>
                    <td class="total-price fw-bold">Rp0</td>
                  </tr>
                </tfoot>
              </table>
            </div>
            <button
              class="btn-lg btn-warning btn-purchase d-block mx-auto mt-3 text-light"
            >
              Purchase
            </button>
          </div>
        </div>
      </div>
    </section>

    <!-- The Modal -->
    <div class="modal fade" id="myModal">
      <div class="modal-dialog">
        <div class="modal-content">
          <!-- Modal Header -->
          <div class="modal-header bg-warning text-white">
            <h4 class="modal-title">Payment Details</h4>
            <button
              type="button"
              class="btn-close"
              data-bs-dismiss="modal"
            ></button>
          </div>
          <form id="payment-details" autocomplete="off">
            <!-- Modal body -->
            <div class="modal-body">
              <div class="mb-3">
                <label class="mb-2" for="name">Full name</label>
                <input
                  type="text"
                  class="form-control input-focus"
                  id="name"
                  placeholder="Enter your full name"
                  required
                />
              </div>
              <div class="mb-3">
                <label class="mb-2" for="email">Email</label>
                <input
                  type="email"
                  class="form-control input-focus"
                  id="email"
                  placeholder="Enter your email"
                  required
                />
              </div>
              <div class="mb-3">
                <label class="mb-2" for="address">Address</label>
                <textarea
                  class="form-control input-focus"
                  rows="5"
                  id="address"
                  placeholder="Include your country, city, state/province, and zip/postal"
                  required
                ></textarea>
              </div>
              <div class="card">
                <div class="card-header bg-warning text-white">
                  <i class="bi bi-credit-card"></i> Card Details
                </div>
                <div class="card-body">
                  <div class="mb-3">
                    <label class="mb-2" for="card-number">Card Number</label>
                    <div class="input-group">
                      <span class="input-group-text"
                        ><i class="bi bi-credit-card-fill"></i
                      ></span>
                      <input
                        type="number"
                        class="form-control input-focus"
                        id="card-number"
                        placeholder="1234 5678 9012 3456"
                        required
                      />
                    </div>
                  </div>
                  <div class="mb-0">
                    <div class="row">
                      <div class="col">
                        <label class="mb-2" for="card-name">Name on Card</label>
                        <input
                          id="card-name"
                          type="text"
                          class="form-control input-focus"
                          placeholder="John Doe"
                          required
                          maxlength="16"
                        />
                      </div>
                      <div class="col d-flex flex-column justify-content-end">
                        <label class="mb-2" for="expiry-date"
                          >Expiry Date</label
                        >
                        <input
                          id="expiry-date"
                          type="text"
                          class="form-control input-focus"
                          placeholder="MM / YY"
                          required
                          maxlength="5"
                        />
                      </div>
                      <div class="col d-flex flex-column justify-content-end">
                        <label class="mb-2" for="cv-code">CV Code</label>
                        <input
                          id="cv-code"
                          type="number"
                          class="form-control input-focus"
                          placeholder="123"
                          maxlength="3"
                          required
                        />
                      </div>
                    </div>
                  </div>
                </div>
              </div>
              <p class="mt-4 mb-2 text-center">
                You'll be charged <span id="total-payment">US$29.25</span>
              </p>
            </div>
            <!-- Modal footer -->
            <div class="modal-footer">
              <button
                id="pay"
                type="submit"
                class="btn btn-warning text-white w-100"
              >
                Pay
              </button>
            </div>
          </form>
        </div>
      </div>
    </div>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-ka7Sk0Gln4gmtz2MlQnikT1wXgYsOg+OMhuP+IlRH9sENBO0LRn5q+8nbTov4+1p"
      crossorigin="anonymous"
    ></script>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    <script src="../js/shopping-cart.js"></script>
  </body>
</html>
