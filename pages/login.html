<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login Page - Rajaerba Indochem</title>
    <link rel="stylesheet" href="../style.css" />
    <link rel="icon" type="image/jpg" href="../images/favicon.jpg" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3"
      crossorigin="anonymous"
    />
    <style>
      .input-focus:focus {
        border-color: #ffa31b;
        box-shadow: 0 0 0 0.25rem rgb(225 162 33 / 25%);
      }

      .button-orange {
        background-color: #ffa31b;
      }

      .button-orange:hover {
        background-color: #fdb447;
      }
    </style>
  </head>
  <body>
    <section class="h-100">
      <div class="container h-100">
        <div class="row justify-content-sm-center h-100">
          <div class="col-xxl-4 col-xl-5 col-lg-5 col-md-7 col-sm-9">
            <div class="text-center my-5 mb-4">
              <a href="../index.html">
                <img src="../images/rajaerba-logo.png" alt="logo" width="350" />
              </a>
            </div>
            <div class="card shadow-lg">
              <div class="card-body p-5">
                <h1 class="fs-4 card-title fw-bold mb-4">Login</h1>
                <form class="needs-validation" autocomplete="off" novalidate>
                  <div class="mb-3">
                    <label for="email" class="mb-2 text-muted"
                      >E-Mail Address</label
                    >
                    <input
                      id="email"
                      type="email"
                      class="form-control input-focus"
                      required
                      autofocus
                    />
                    <div class="invalid-feedback">Email is invalid</div>
                  </div>
                  <div class="mb-3">
                    <div class="mb-2 w-100">
                      <label for="passoword" class="text-muted">Password</label>
                    </div>
                    <input
                      type="password"
                      id="password"
                      class="form-control input-focus"
                      required
                    />
                    <div class="invalid-feedback">Password is required</div>
                  </div>
                  <div class="d-flex align-items-center">
                    <button
                      id="login"
                      type="submit"
                      class="btn btn-warning ms-auto w-100 mt-3 button-orange text-white"
                    >
                      Login
                    </button>
                  </div>
                </form>
              </div>
              <div class="card-footer py-3 border-0">
                <div class="text-center">
                  Don't have an account?
                  <form class="d-inline">
                    <a href="register.html" class="text-dark">Create One</a>
                  </form>
                </div>
              </div>
            </div>
            <div class="text-center mt-5 text-muted">
              Copyright &copy; 2021 &mdash; Rajaeba Indochem
            </div>
          </div>
        </div>
      </div>
    </section>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    <script src="../js/login.js"></script>
    <script>
      (function () {
        "use strict";

        // Fetch all the forms we want to apply custom Bootstrap validation styles to
        var forms = document.querySelectorAll(".needs-validation");

        // Loop over them and prevent submission
        Array.prototype.slice.call(forms).forEach(function (form) {
          form.addEventListener(
            "submit",
            function (event) {
              if (!form.checkValidity()) {
                event.preventDefault();
                event.stopPropagation();
              }

              form.classList.add("was-validated");
            },
            false
          );
        });
      })();
    </script>
  </body>
</html>
